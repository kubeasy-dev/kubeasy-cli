name: Generate Zod Schema

on:
  push:
    branches: [main]
    paths:
      - 'internal/validation/types.go'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"
          cache: true
          cache-dependency-path: go.sum

      - name: Generate schema
        run: go run hack/generate-schema/main.go > /tmp/challengeObjectives.ts

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          repository: kubeasy-dev/app
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          path: monorepo

      - name: Configure git
        working-directory: monorepo
        run: |
          git config --local user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --local user.email "${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Create or update PR with schema update
        working-directory: monorepo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH_NAME="chore/update-schema-from-cli"

          # Fetch all branches
          git fetch origin

          # Switch to the target branch BEFORE copying the file to avoid
          # "local changes would be overwritten by checkout" errors
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git checkout "$BRANCH_NAME"
            git pull origin "$BRANCH_NAME"
          else
            git checkout -b "$BRANCH_NAME"
          fi

          # Copy the generated schema onto the now-correct branch
          cp /tmp/challengeObjectives.ts packages/api-schemas/src/objectives.ts

          # Add and commit changes
          git add packages/api-schemas/src/objectives.ts

          # Only proceed if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update objectives.ts from CLI"

          # Push branch (force push to update if exists)
          git push origin "$BRANCH_NAME" --force

          # Create PR if it doesn't exist (will fail silently if PR already exists)
          gh pr create \
            --title "chore: update objectives.ts from CLI" \
            --body "To be merged at next kubeasy-cli release" \
            --base main \
            --head "$BRANCH_NAME" || echo "PR already exists, updated with new commits"
