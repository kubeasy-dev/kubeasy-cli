[tools]
go = "1.26.2"
golangci-lint = "2.11.4"
goreleaser = "2.15.4"

[vars]
BINARY_NAME = "kubeasy"
BUILD_DIR = "bin"
DIST_DIR = "dist"
# K8S_VERSION should match pkg/constants/const.go KindNodeImage version.
# Both are managed by Renovate and grouped together to prevent version drift.
# renovate: datasource=docker depName=kindest/node
K8S_VERSION = "1.35.0"

# ===========================================================================
# Meta
# ===========================================================================

[tasks.default]
description = "Show available tasks"
run = "mise tasks"

# ===========================================================================
# Dependencies
# ===========================================================================

[tasks.deps]
description = "Download and tidy Go dependencies"
run = """
echo "Downloading dependencies..."
go mod download
go mod tidy
"""

[tasks.vendor]
description = "Generate vendor directory"
run = """
echo "Generating vendor directory..."
go mod vendor
"""

# ===========================================================================
# Tool Installation (Go-installed tools not managed by mise)
# ===========================================================================

["tasks.install:envtest"]
description = "Install setup-envtest"
run = "command -v setup-envtest || go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest"

["tasks.install:gocovmerge"]
description = "Install gocovmerge"
run = "command -v gocovmerge || go install github.com/wadey/gocovmerge@latest"

["tasks.install:oapi-codegen"]
description = "Install oapi-codegen"
run = "command -v oapi-codegen || go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.1"

["tasks.install:tools"]
description = "Install all development tools"
depends = ["install:envtest", "install:gocovmerge", "install:oapi-codegen"]

# ===========================================================================
# Setup
# ===========================================================================

["tasks.setup:envtest"]
description = "Setup envtest Kubernetes assets"
depends = ["install:envtest"]
run = """
test -d ./bin/k8s/k8s && exit 0
echo "Setting up envtest assets..."
"$(go env GOPATH)/bin/setup-envtest" use {{vars.K8S_VERSION}} --bin-dir ./bin/k8s
"""

# ===========================================================================
# Code Generation
# ===========================================================================

["tasks.generate:api"]
description = "Generate Go API client from OpenAPI spec"
depends = ["install:oapi-codegen"]
sources = ["openapi.json", "oapi-codegen.yaml"]
outputs = ["internal/apigen/client.gen.go"]
run = """
mkdir -p internal/apigen
oapi-codegen --config oapi-codegen.yaml openapi.json
"""

# ===========================================================================
# Build
# ===========================================================================

[tasks.build]
description = "Build the binary for current platform"
sources = ["**/*.go", "go.mod", "go.sum"]
outputs = ["{{vars.BUILD_DIR}}/{{vars.BINARY_NAME}}"]
run = """
VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
LDFLAGS="-s -w \
  -X 'github.com/kubeasy-dev/kubeasy-cli/internal/constants.Version=${VERSION}' \
  -X 'github.com/kubeasy-dev/kubeasy-cli/internal/constants.LogFilePath=/tmp/kubeasy-cli.log' \
  -X 'github.com/kubeasy-dev/kubeasy-cli/internal/constants.WebsiteURL=https://kubeasy.dev' \
  -X 'github.com/kubeasy-dev/kubeasy-cli/internal/constants.ExercicesRepoBranch=main'"
echo "Building {{vars.BINARY_NAME}} ${VERSION}..."
mkdir -p {{vars.BUILD_DIR}}
go build -ldflags "${LDFLAGS}" -o {{vars.BUILD_DIR}}/{{vars.BINARY_NAME}} .
"""

["tasks.build:all"]
description = "Build binaries for all platforms"
depends = ["clean"]
run = """
VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
LDFLAGS="-s -w \
  -X 'github.com/kubeasy-dev/kubeasy-cli/internal/constants.Version=${VERSION}' \
  -X 'github.com/kubeasy-dev/kubeasy-cli/internal/constants.LogFilePath=/tmp/kubeasy-cli.log' \
  -X 'github.com/kubeasy-dev/kubeasy-cli/internal/constants.WebsiteURL=https://kubeasy.dev' \
  -X 'github.com/kubeasy-dev/kubeasy-cli/internal/constants.ExercicesRepoBranch=main'"
echo "Building for all platforms..."
mkdir -p {{vars.DIST_DIR}}
for GOOS in linux darwin windows; do
  for GOARCH in amd64 arm64; do
    EXT=""
    [ "$GOOS" = "windows" ] && EXT=".exe"
    echo "  → ${GOOS} ${GOARCH}..."
    GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "${LDFLAGS}" \
      -o {{vars.DIST_DIR}}/{{vars.BINARY_NAME}}-${GOOS}-${GOARCH}${EXT} .
  done
done
"""

# ===========================================================================
# Testing
# ===========================================================================

[tasks.test]
description = "Run all tests (unit + integration)"
depends = ["test:unit", "test:integration"]

["tasks.test:unit"]
description = "Run unit tests only"
run = """
echo "Running unit tests..."
go test -v -race -coverprofile=coverage-unit.out -covermode=atomic \
  -coverpkg=./internal/... $(go list ./... | grep -v /test/integration)
if [ -s coverage-unit.out ]; then
  go tool cover -func=coverage-unit.out | tail -1
fi
"""

["tasks.test:integration"]
description = "Run integration tests"
depends = ["setup:envtest"]
run = """
echo "Running integration tests..."
KUBEBUILDER_ASSETS=$("$(go env GOPATH)/bin/setup-envtest" use -p path {{vars.K8S_VERSION}}) \
  go test -v -tags=integration -coverprofile=coverage-integration.out \
  -covermode=atomic -coverpkg=./internal/... ./test/integration/... -timeout 15m
if [ -s coverage-integration.out ]; then
  go tool cover -func=coverage-integration.out | tail -1
fi
"""

["tasks.test:e2e"]
description = "Run Kind integration tests (requires Docker)"
run = """
echo "Running Kind integration tests..."
go test -v -tags=kindintegration -count=1 ./test/e2e/... -timeout 10m
"""

["tasks.test:coverage"]
description = "Generate combined coverage report"
depends = ["install:gocovmerge", "test:unit", "test:integration"]
run = """
echo "Generating combined coverage report..."
mkdir -p coverage
GOPATH=$(go env GOPATH)
if [ -s coverage-unit.out ] && [ -s coverage-integration.out ]; then
  echo "Merging unit and integration coverage..."
  "${GOPATH}/bin/gocovmerge" coverage-unit.out coverage-integration.out > coverage.out
elif [ -s coverage-integration.out ]; then
  cp coverage-integration.out coverage.out
elif [ -s coverage-unit.out ]; then
  cp coverage-unit.out coverage.out
else
  echo "No coverage data found"
  exit 1
fi
go tool cover -html=coverage.out -o coverage.html
go tool cover -func=coverage.out | tail -1
"""

# ===========================================================================
# Linting & Formatting
# ===========================================================================

[tasks.lint]
description = "Run golangci-lint"
run = """
echo "Running linters..."
golangci-lint run --config .github/linters/.golangci.yml
"""

["tasks.lint:fix"]
description = "Run golangci-lint with auto-fix"
run = """
echo "Running linters with auto-fix..."
golangci-lint run --config .github/linters/.golangci.yml --fix
gofmt -w $(find . -name "*.go" -not -path "./vendor/*")
"""

[tasks.fmt]
description = "Format Go code"
run = """
echo "Formatting code..."
gofmt -w $(find . -name "*.go" -not -path "./vendor/*")
"""

# ===========================================================================
# Cleanup
# ===========================================================================

[tasks.clean]
description = "Clean build artifacts"
run = """
echo "Cleaning..."
rm -rf {{vars.BUILD_DIR}} {{vars.DIST_DIR}} vendor coverage*.out coverage.html coverage/
go clean -testcache
"""

# ===========================================================================
# Development
# ===========================================================================

[tasks.dev]
description = "Build and run in development mode"
depends = ["build"]
run = "./{{vars.BUILD_DIR}}/{{vars.BINARY_NAME}}"

# ===========================================================================
# Renovate
# ===========================================================================

["tasks.renovate:dry-run"]
description = "Run renovate in debug mode"
run = """
echo "Running renovate in debug mode..."
docker run --rm -v $(pwd):/usr/src/app/renovate renovate/renovate --platform=local
"""
